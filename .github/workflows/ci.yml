name: CI

on:
  push:
    branches:
      - "**"
    paths:
      - "problem5/**"
      - "problem6/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "problem5/**"
      - "problem6/**"
      - ".github/workflows/ci.yml"

jobs:
  quality-gates:
    name: "quality-gates (${{ matrix.project }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: problem5
            working_dir: problem5
            setup_cmd: "pnpm install --frozen-lockfile"
            typecheck_cmd: "pnpm typecheck"
            lint_cmd: "pnpm lint"
            test_cmd: "pnpm test:unit"
          - project: problem6
            working_dir: problem6
            setup_cmd: "mise run setup"
            typecheck_cmd: "mise run typecheck"
            lint_cmd: "mise run lint"
            test_cmd: "mise run test"

    defaults:
      run:
        working-directory: ${{ matrix.working_dir }}

    env:
      HUSKY: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mise and project tools
        uses: jdx/mise-action@v2
        with:
          version: 2026.4.8

      - name: Install dependencies
        run: ${{ matrix.setup_cmd }}

      - name: Type check
        run: ${{ matrix.typecheck_cmd }}

      - name: Lint
        run: ${{ matrix.lint_cmd }}

      - name: Run tests
        run: ${{ matrix.test_cmd }}
