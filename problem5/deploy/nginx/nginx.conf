# =============================================================================
# nginx.conf — benchmark topology for docker-compose.prod.yml
# =============================================================================
# Mounted into the nginx container at /etc/nginx/nginx.conf (read-only).
# Tuned for HTTP/1.1 keepalive to upstream so the Docker bridge network does
# not pay SYN/SYNACK round trips on every request under 10k RPS load.
# Pinned image: nginx:1.27-alpine (see docker-compose.prod.yml).
# =============================================================================

# Let nginx scale its workers to match host cores. On an M4 Pro (12 cores),
# this gives nginx enough parallelism to not become the bottleneck before the
# three Node.js event loops do.
worker_processes auto;

# Process model plumbing. The official nginx:1.27-alpine image already passes
# `daemon off;` via the entrypoint, so do NOT set it here (would be a duplicate
# directive and nginx emits `[emerg] "daemon" directive is duplicate`). Log to
# stderr so `docker logs` surfaces warnings/errors; pid file goes somewhere
# writable under the read-only config mount.
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    # Each worker handles up to 4096 concurrent connections. The k6 read-load
    # scenario peaks at a few hundred VUs, so this is plenty of headroom.
    worker_connections 4096;
    multi_accept on;
}

http {
    # Access log goes to stdout so `docker logs nginx` surfaces request-level
    # info during a benchmark. Set to `off` if the log volume is distorting
    # the measurement; uncomment the off line and comment the stdout line.
    access_log /dev/stdout combined;
    # access_log off;

    # Tell downstream clients we understand HTTP/1.1 keepalive and will honor
    # Connection: keep-alive from k6 (which does honor it).
    keepalive_timeout 65s;
    keepalive_requests 10000;

    # Disable sendfile for ephemeral in-memory payloads — it's a net win on
    # static file serving, not on reverse-proxy responses, and on some macOS
    # Docker Desktop setups it has surprising semantics.
    sendfile off;
    tcp_nopush off;
    tcp_nodelay on;

    # DNS-ish. Prevents a startup race where nginx can't resolve upstream
    # hostnames before all three api replicas have finished their healthcheck
    # boot. Docker Compose's `depends_on: condition: service_healthy` handles
    # this on our stack, but keeping nginx's own resolver tunable is cheap.
    types_hash_max_size 2048;
    server_tokens off;

    # -------------------------------------------------------------------------
    # Upstream pool — three API replicas, round-robin, HTTP/1.1 keepalive
    # -------------------------------------------------------------------------
    # Round-robin is correct because the API is stateless (Redis holds the
    # cache; no in-process session state). Every replica can serve every
    # request with identical performance characteristics, so there is no
    # reason to pin requests to replicas.
    #
    # `keepalive 64` = nginx keeps up to 64 idle upstream connections per
    # worker. With worker_processes auto on a 12-core box, that's plenty of
    # headroom for benchmark load without exhausting Postgres's max_connections
    # or the Node process's HTTP server accept queue.
    #
    # No `max_fails` / `fail_timeout` overrides — nginx open-source uses
    # passive health detection (mark a peer as failed after N errors within
    # the fail_timeout window). Defaults are fine for a benchmark: if a
    # replica dies mid-run, nginx pulls it after a few errored requests and
    # the result lands in Benchmark_prod.md honestly.
    upstream resources_api {
        server api-1:3000 max_fails=3 fail_timeout=10s;
        server api-2:3000 max_fails=3 fail_timeout=10s;
        server api-3:3000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    # -------------------------------------------------------------------------
    # Server block — listens on :80 inside the network, published on host
    # port ${NGINX_PORT:-8080} by docker-compose.prod.yml.
    # -------------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        # Body size cap matches the API's own 64 KB request limit so oversized
        # requests get the same 413 behavior whether they hit nginx or the
        # direct dev api service.
        client_max_body_size 64k;

        # -----------------------------------------------------------------
        # Proxy defaults applied to all location blocks below.
        # -----------------------------------------------------------------
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # required so upstream sees keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy timeouts — matched to or slightly above the API's own
        # timeouts so nginx is never the entity that aborts a slow request.
        # If nginx times out while the API is still willing to respond, the
        # benchmark records an nginx 504 instead of the API's actual behavior,
        # which would be a misleading data point.
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # -----------------------------------------------------------------
        # /healthz — explicit passthrough so external liveness probes can
        # check the stack without having to know about any specific route.
        # -----------------------------------------------------------------
        location = /healthz {
            proxy_pass http://resources_api;
        }

        # -----------------------------------------------------------------
        # Catch-all — every other path is reverse-proxied round-robin.
        # -----------------------------------------------------------------
        location / {
            proxy_pass http://resources_api;
        }
    }
}
