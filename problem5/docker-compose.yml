services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: resources-api
    container_name: resources-api
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-resources_dev}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000}/healthz?probe=liveness || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: resources-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-resources_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-resources_dev}"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: resources-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Benchmark runner — only active with: docker compose --profile bench up
  # Runs the smoke scenario by default. For other scenarios, override the
  # command: docker compose --profile bench run k6 run benchmarks/scenarios/read-load.js
  # ---------------------------------------------------------------------------
  k6:
    image: grafana/k6:latest
    container_name: resources-k6
    profiles:
      - bench
    volumes:
      - ./benchmarks:/benchmarks
    command: run /benchmarks/scenarios/smoke.js
    environment:
      - BASE_URL=http://api:3000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Prometheus scraper — only active with: docker compose --profile metrics up -d
  # Scrapes http://api:3000/metrics every 5 s. UI at http://localhost:9090.
  # Scrape history survives `docker compose down` via the prometheus-data volume;
  # wipe with `docker compose down -v`.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: resources-prometheus
    profiles:
      - metrics
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana dashboard — only active with: docker compose --profile metrics up -d
  # UI at http://localhost:${GRAFANA_PORT:-3300}. Anonymous Viewer access is
  # enabled for local dev; admin credentials are `admin / admin`. The Prometheus
  # datasource and the Resources API dashboard are file-provisioned from
  # ./deploy/grafana/ and reloaded on every container start, so
  # `docker compose down -v` is safe.
  #
  # The default host port is 3300 (NOT Grafana's built-in 3000) because the
  # Resources API dev server binds 3000 on the host. Override with GRAFANA_PORT
  # if you want something else; Grafana's container port is always 3000.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.3
    container_name: resources-grafana
    profiles:
      - metrics
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  pg-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
