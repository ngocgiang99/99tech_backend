# ───────────────────────────────────────────────────────────────────────────
# problem6 · Compose override — host port remap
#
# WHY THIS FILE EXISTS:
#   The canonical `docker-compose.yml` publishes Postgres/Redis/NATS on the
#   default ports (5432/6379/4222/8222). On a host that is already running a
#   sibling project (e.g. `problem5` with its own Postgres on :5432), those
#   defaults collide. Editing `docker-compose.yml` to change the ports would
#   violate Story 1.1 AC-6 / Story 1.2 AC-8 (the canonical scaffold files
#   are SHA-256-pinned and must remain byte-identical).
#
# WHAT THIS FILE DOES:
#   Compose v2 auto-merges any `compose.override.yml` next to `compose.yml`
#   (or `docker-compose.yml`) when running `docker compose up`. We use it
#   to override ONLY the host-side port mapping. Container internals (image
#   tag, env, healthcheck, volumes, command flags) are unchanged.
#
# PORT MAP (host → container):
#   55432 → postgres   5432
#   56379 → redis      6379
#   54222 → nats       4222   (client protocol)
#   58222 → nats       8222   (monitoring HTTP)
#
# CONSEQUENCES:
#   - `.env.example` documents DSNs against the override ports (55432/56379/54222).
#   - The container-network DNS (postgres:5432, redis:6379, nats:4222) used by
#     the optional `api` profile is UNCHANGED — that path runs inside the
#     compose network and never sees the host port.
#   - To revert to the canonical defaults, delete this file (and update .env).
# ───────────────────────────────────────────────────────────────────────────
name: problem6

services:
  postgres:
    ports: !override
      - "55432:5432"

  redis:
    ports: !override
      - "56379:6379"

  nats:
    ports: !override
      - "54222:4222"
      - "58222:8222"

  # ─────────────────────────────────────────────────────────────────────────
  # Local observability stack (dev only) — opt-in via `--profile observability`
  #
  # Default `docker compose up` does NOT start these services. To run them:
  #   mise run obs:up      # start prometheus + grafana
  #   mise run obs:down    # stop them
  #
  # Full documentation, troubleshooting, and the dashboard edit-and-commit
  # workflow live in `infra/local/README.md`. The anonymous-admin Grafana
  # settings and loopback-only port bindings are DEV CONVENIENCES — they
  # MUST NOT be transferred to `infra/helm/` or any production IaC.
  # ─────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    profiles: ["observability"]
    volumes:
      - ./infra/local/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:59090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["observability"]
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      - ./infra/local/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/local/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:53000:3000"
    restart: unless-stopped
