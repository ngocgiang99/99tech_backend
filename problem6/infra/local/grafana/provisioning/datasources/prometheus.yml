# Grafana datasource provisioning — loaded on first container boot.
# Points at the in-compose Prometheus service via compose-network DNS.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 5s
