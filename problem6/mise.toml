# ─── problem6 · Scoreboard Module · Toolchain & Tasks ────────────────────────
#
# mise (https://mise.jdx.dev) is the single interface for managing the toolchain
# and running project commands. Do not use `npm run …`; use `mise run …`.
#
# Quickstart:
#   mise install          # installs Node and pnpm at pinned versions
#   mise run setup        # pnpm install + kysely codegen
#   mise run infra:up     # docker compose up (postgres, redis, nats)
#   mise run db:migrate   # apply migrations
#   mise run dev          # start API in watch mode on :3000
#   mise run test:coverage  # unit tests + ≥80% coverage gate

[tools]
node = "22.11.0"
pnpm = "9.12.0"

[env]
_.file    = ".env"
NODE_ENV  = "development"
PORT      = "3000"

# ─── Setup ───────────────────────────────────────────────────────────────────
# First-clone bootstrap. Intentionally does NOT run `db:codegen` — that task
# requires a live Postgres and a migrated schema, which a fresh clone does
# not have. After `mise run setup`, the developer runs these in order on
# first DB use: `mise run infra:up` → `mise run db:migrate` → `mise run db:codegen`.
[tasks.setup]
description = "Install dependencies (post-setup: infra:up, db:migrate, db:codegen)"
run = "pnpm install --frozen-lockfile"

# ─── Dev loop ────────────────────────────────────────────────────────────────
[tasks.dev]
description = "Run API in watch mode on :3000"
run = "pnpm nest start --watch"

[tasks.build]
description = "Produce a production build in ./dist"
run = "pnpm nest build"

[tasks.start]
description = "Run the compiled server"
run = "node dist/main.js"

# ─── Quality gates ───────────────────────────────────────────────────────────
[tasks.lint]
description = "Lint the codebase (zero warnings allowed)"
run = "pnpm eslint 'src/**/*.ts' --max-warnings 0"

[tasks.typecheck]
description = "Strict TypeScript check"
run = "pnpm tsc --noEmit"

[tasks.format]
description = "Apply Prettier"
run = "pnpm prettier --write 'src/**/*.ts'"

[tasks.check]
description = "Run lint + typecheck + unit tests (pre-push gate)"
depends = ["lint", "typecheck", "test"]

# ─── Tests ───────────────────────────────────────────────────────────────────
[tasks.test]
description = "Unit tests (pure domain + application, no I/O)"
run = "pnpm jest --config jest.config.ts"

[tasks."test:integration"]
description = "Integration tests with Testcontainers (real Postgres + Redis + NATS)"
run = "pnpm jest --config jest.integration.config.ts --runInBand"

[tasks."test:e2e"]
description = "End-to-end tests against the docker-compose stack"
run = "pnpm jest --config jest.e2e.config.ts --runInBand"

[tasks."test:coverage"]
description = "Unit tests with coverage — fails build if <80% lines/branches/functions/statements (domain: 100%)"
run = "pnpm jest --config jest.config.ts --coverage"

[tasks."test:load"]
description = "k6 load test — 10k SSE connections + write burst (pass -- --quick for a 1-minute smoke run)"
run = """
if [ "${1:-}" = "--quick" ]; then
  K6_QUICK=1 k6 run test/load/scoreboard.k6.ts
else
  k6 run test/load/scoreboard.k6.ts
fi
"""

# ─── Database (Kysely + kysely-ctl) ──────────────────────────────────────────
[tasks."db:migrate"]
description = "Apply pending migrations"
run = "pnpm kysely migrate:latest"

[tasks."db:migrate:make"]
description = "Create a new migration file — usage: mise run db:migrate:make -- init_scoreboard"
run = "pnpm kysely migrate:make"

[tasks."db:migrate:down"]
description = "Roll back the most recent migration"
run = "pnpm kysely migrate:down"

[tasks."db:codegen"]
description = "Regenerate TypeScript DB types from the live schema"
run = "pnpm kysely-codegen --out-file src/database/types.generated.ts"

[tasks."db:seed"]
description = "Seed the local DB with sample users"
run = "pnpm tsx scripts/seed.ts"

# ─── Local infrastructure (docker compose) ───────────────────────────────────
[tasks."infra:up"]
description = "Start Postgres + Redis + NATS"
run = "docker compose up -d postgres redis nats"

[tasks."infra:up:full"]
description = "Start infra + API container"
run = "docker compose --profile full up -d"

[tasks."infra:up:tools"]
description = "Start infra + dev tooling (adminer, redis-commander, nats-box)"
run = "docker compose --profile tools up -d"

[tasks."infra:down"]
description = "Stop all services"
run = "docker compose down"

[tasks."infra:reset"]
description = "Stop services AND delete volumes — WARNING: wipes local data"
run = "docker compose down -v"

[tasks."infra:logs"]
description = "Tail logs from all services"
run = "docker compose logs -f"

# ─── Local observability (prometheus + grafana, opt-in) ─────────────────────
# These tasks boot a dev-only metrics stack defined in compose.override.yml
# under the `observability` profile. Default `mise run infra:up` is
# unaffected. See infra/local/README.md for URLs, troubleshooting, and the
# dashboard edit-and-commit workflow.
[tasks."obs:up"]
description = "Start the local observability stack (prometheus + grafana)"
run = "docker compose --profile observability up -d prometheus grafana"

[tasks."obs:down"]
description = "Stop the local observability stack"
run = "docker compose --profile observability stop prometheus grafana"

[tasks."obs:logs"]
description = "Follow prometheus + grafana logs"
run = "docker compose --profile observability logs -f prometheus grafana"

[tasks."obs:reload"]
description = "Hot-reload the Prometheus config"
run = "curl -X POST http://localhost:59090/-/reload"

# ─── Docker image ────────────────────────────────────────────────────────────
# ─── NATS JetStream helpers ──────────────────────────────────────────────────
[tasks."nats:init"]
description = "Create or update the SCOREBOARD JetStream stream (idempotent; MVP retention: 1 month / 1M msgs / 1 GB)"
run = """
docker compose --profile tools run --rm --entrypoint nats nats-box \
  --server nats://nats:4222 stream add SCOREBOARD \
    --subjects='scoreboard.>' \
    --storage=file \
    --retention=limits \
    --max-age=720h \
    --max-msgs=1000000 \
    --max-bytes=1073741824 \
    --discard=old \
    --dupe-window=2m \
    --replicas=1 \
    --defaults
"""

[tasks."nats:info"]
description = "Inspect the SCOREBOARD stream"
run = "docker compose --profile tools run --rm --entrypoint nats nats-box --server nats://nats:4222 stream info SCOREBOARD"

[tasks."nats:cli"]
description = "Open an interactive nats CLI"
run = "docker compose --profile tools run --rm --entrypoint sh nats-box"

# ─── Docker image ────────────────────────────────────────────────────────────
[tasks."docker:build"]
description = "Build the runtime image locally"
run = "docker build --target runtime -t problem6/scoreboard-api:dev ."

[tasks."docker:run"]
description = "Run the runtime image against the compose network"
run = "docker run --rm -it --network problem6_default -p 3000:3000 --env-file .env problem6/scoreboard-api:dev"
