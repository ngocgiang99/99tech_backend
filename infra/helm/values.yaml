# =============================================================================
# values.yaml — TEMPLATE
# Operators MUST review and replace all TODO-marked values before applying.
# =============================================================================

image:
  repository: "your-registry/problem6-scoreboard-api"  # TODO: replace with your actual registry/image
  tag: "v1.0.0-rc1"
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  host: "scoreboard.example.com"  # TODO: replace with your actual domain
  stickySession: true

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Non-secret environment variables — these land in ConfigMap
# Secrets (INTERNAL_JWT_SECRET, ACTION_TOKEN_SECRET, ACTION_TOKEN_SECRET_PREV)
# are managed via the Secret resource (see templates/secret.yaml)
env:
  NODE_ENV: "production"
  PORT: "3000"
  DATABASE_URL: "postgres://user:password@postgres:5432/scoreboard"  # TODO: replace
  REDIS_URL: "redis://redis:6379"  # TODO: replace
  NATS_URL: "nats://nats:4222"  # TODO: replace
  NATS_STREAM_NAME: "SCOREBOARD"
  NATS_STREAM_MAX_AGE_SECONDS: "2592000"
  NATS_STREAM_MAX_MSGS: "1000000"
  NATS_STREAM_MAX_BYTES: "1073741824"
  NATS_STREAM_REPLICAS: "1"  # TODO: set to 3 in production NATS cluster
  NATS_DEDUP_WINDOW_SECONDS: "120"
  ACTION_TOKEN_TTL_SECONDS: "300"
  RATE_LIMIT_PER_SEC: "10"
  MAX_SSE_CONN_PER_INSTANCE: "5000"
  LEADERBOARD_REBUILD_TOP_N: "10000"
  OUTBOX_POLL_INTERVAL_MS: "50"
  OUTBOX_LOCK_TTL_SECONDS: "10"
  OUTBOX_COALESCE_WINDOW_MS: "100"
  SSE_BACKPRESSURE_MAX_PENDING_MESSAGES: "50"
  SSE_SLOW_CLIENT_BUFFER_TIMEOUT_MS: "5000"
  SSE_HEARTBEAT_INTERVAL_MS: "15000"
  LOG_LEVEL: "info"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""  # TODO: set to your OTLP collector endpoint

configMap:
  name: scoreboard-config

secret:
  name: scoreboard-secret

podDisruptionBudget:
  minAvailable: 2
